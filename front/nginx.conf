server {
    listen       80;
    server_name  _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve files directly, fallback to index.html for SPA routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|woff2?|ttf)$ {
        try_files $uri =404;
        expires 7d;
        access_log off;
    }

    # Avoid exposing nginx default error pages for SPA
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
