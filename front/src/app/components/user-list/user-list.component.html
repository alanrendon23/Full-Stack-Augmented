<div class="user-container">
  <h2>User Management</h2>

  <form (ngSubmit)="submitUser()" class="user-form">
    <input
      type="text"
      [(ngModel)]="userForm.name"
      name="name"
      placeholder="Name"
      required
    />
    <input
      type="email"
      [(ngModel)]="userForm.email"
      name="email"
      placeholder="Email"
      required
    />
    <button type="submit">
      {{ editingId !== null ? "Update" : "Create" }}
    </button>
    <button type="button" (click)="resetForm()" *ngIf="editingId !== null">
      Cancel
    </button>
  </form>

  <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>

  <p *ngIf="loading">Loading users...</p>

  <ul class="user-list" *ngIf="!loading">
    <li *ngFor="let user of users" class="user-item">
      <div>
        <strong>{{ user.name }}</strong>
        <div>{{ user.email }}</div>
      </div>
      <div class="actions">
        <button type="button" (click)="editUser(user)">Edit</button>
        <button type="button" (click)="deleteUser(user.id)">Delete</button>
      </div>
    </li>
  </ul>
</div>
